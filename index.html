<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAB_CORE.SYS — Chemistry Lab Dashboard</title>
    <!-- Flash prevention: set --bg-base before stylesheets paint -->
    <script>
      (function() {
        var bgMap = {
          CHEM_LAB:       '#0F1117',
          RADIOACTIVE:    '#050A06',
          PLASMA:         '#0D0806',
          SYNTHWAVE:      '#0E0718',
          DEEP_OCEAN:     '#050B1A',
          AMBER_TERMINAL: '#0C0900',
        };
        var stored = '';
        try { stored = localStorage.getItem('jenkins-media-theme') || ''; } catch(e) {}
        var bg = bgMap[stored] || bgMap['CHEM_LAB'];
        document.documentElement.style.setProperty('--bg-base', bg);
      })();
    </script>
    <style>body { background: var(--bg-base, #0F1117); margin: 0; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
